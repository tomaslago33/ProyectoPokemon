<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="home.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
    <footer>
      <main class="contenido-registro">
    <h1>¡Regístrate para recibir correos electrónicos de Pokémon!</h1>
    <form class="registro-correo">
      <input type="email" placeholder="Correo electrónico" required>
      
      <div class="idioma">
        <select>
          <option value="spain">Spain</option>
          <option value="Inglish">Inglish</option>
        </select>
        <input type="date" required>
      </div>

      <div class="seleccion">
        <label>
          <input type="checkbox">
          Videojuegos, aplicaciones y muchas más cosas de Pokémon
        </label>
        <label>
          <input type="checkbox">
          Acepto las <a href="#">Condiciones de uso</a> y la 
          <a href="#">Aviso de privacidad</a> de Pokémon.es
        </label>
      </div>

      <button type="subir">Regístrate</button>
        </form>
    </main>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
